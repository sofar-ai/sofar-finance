<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticker Deep Dives — SOFAR Finance</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .td-header { padding: 18px 0 10px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
    .td-title { font-family: var(--font-mono); font-size: 13px; font-weight: 700; color: var(--text-primary); letter-spacing: .05em; }
    .td-subtitle { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }

    .td-toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .td-search {
      flex: 1; min-width: 160px; max-width: 280px;
      background: var(--bg-secondary); border: 1px solid var(--border);
      color: var(--text-primary); font-family: var(--font-mono); font-size: 11px;
      padding: 6px 10px; border-radius: 4px; outline: none;
    }
    .td-search:focus { border-color: var(--accent); }
    .td-count { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); margin-left: auto; }

    .td-table { width: 100%; border-collapse: collapse; }
    .td-table th {
      font-family: var(--font-mono); font-size: 9px; font-weight: 700; letter-spacing: .08em;
      color: var(--text-secondary); text-transform: uppercase;
      padding: 5px 10px; border-bottom: 1px solid var(--border); text-align: left;
    }
    .td-row { border-bottom: 1px solid rgba(255,255,255,0.04); cursor: pointer; transition: background .15s; }
    .td-row:hover { background: rgba(255,255,255,0.03); }
    .td-row.td-open { background: rgba(255,255,255,0.04); }
    .td-cell { padding: 8px 10px; font-size: 11px; vertical-align: middle; }
    .td-cell-ts { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); white-space: nowrap; }
    .td-cell-ticker { font-family: var(--font-mono); font-weight: 700; font-size: 13px; color: var(--text-primary); }
    .td-cell-bias { font-family: var(--font-mono); font-size: 10px; font-weight: 700; text-transform: uppercase; white-space: nowrap; }
    .td-cell-signal { color: var(--text-secondary); font-size: 11px; max-width: 320px; }
    .td-cell-premium { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); white-space: nowrap; text-align: right; }
    .td-chevron { font-size: 9px; color: var(--text-secondary); padding-right: 8px; transition: transform .2s; }
    .td-row.td-open .td-chevron { transform: rotate(90deg); }

    .td-detail-row { display: none; }
    .td-detail-row.td-open { display: table-row; }
    .td-detail-cell { padding: 0 10px 16px 10px; background: rgba(0,0,0,0.25); border-bottom: 1px solid var(--border); }
    .td-detail-inner { padding: 14px 0 2px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px 24px; }
    @media (max-width: 640px) { .td-detail-inner { grid-template-columns: 1fr; } }

    .td-detail-label {
      font-family: var(--font-mono); font-size: 9px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text-secondary); margin-bottom: 5px;
    }
    .td-detail-text { font-size: 11px; color: var(--text-primary); line-height: 1.5; }

    .td-drivers { list-style: none; padding: 0; margin: 0; }
    .td-drivers li { font-size: 11px; color: var(--text-secondary); padding: 2px 0 2px 12px; position: relative; line-height: 1.4; }
    .td-drivers li::before { content: '›'; position: absolute; left: 0; color: var(--accent); }

    .td-trade-box {
      background: rgba(16,185,129,0.07); border: 1px solid rgba(16,185,129,0.25);
      border-radius: 5px; padding: 9px 12px; font-size: 11px; color: var(--text-primary);
      line-height: 1.5; grid-column: 1 / -1;
    }
    .td-trade-box.bearish { background: rgba(239,68,68,0.07); border-color: rgba(239,68,68,0.25); }
    .td-trade-box-label {
      font-family: var(--font-mono); font-size: 9px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text-secondary); margin-bottom: 4px;
    }

    .td-conf-bar { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .td-conf-track { flex: 1; height: 3px; background: var(--border); border-radius: 2px; max-width: 120px; }
    .td-conf-fill { height: 100%; border-radius: 2px; }
    .td-conf-pct { font-family: var(--font-mono); font-size: 10px; }

    .td-empty { text-align: center; padding: 48px 0; color: var(--text-secondary); font-size: 12px; }
    .td-loading { text-align: center; padding: 48px 0; color: var(--text-secondary); font-size: 11px; font-family: var(--font-mono); }
  </style>
</head>
<body>
  <header class="top-nav">
    <div class="nav-brand">SOFAR<span class="nav-brand-accent">.</span>FINANCE</div>
    <nav class="top-nav-links">
      <a href="index.html"        class="nav-tab">Market Dashboard</a>
      <a href="options-flow.html" class="nav-tab">Options Flow</a>
      <a href="ai-analysis.html"  class="nav-tab">AI Analysis</a>
      <a href="daily-summary.html" class="nav-tab">Daily Summary</a>
      <a href="performance.html"  class="nav-tab">Performance</a>
      <a href="ticker-dives.html" class="nav-tab active">Deep Dives</a>
      <a href="config.html"       class="nav-tab">Config</a>
    </nav>
  </header>

  <main class="main-content">
    <div class="content-wrapper">
      <div class="td-header">
        <div class="td-title">📊 TICKER DEEP DIVES</div>
        <div class="td-subtitle">AI-powered single-ticker options flow analysis · Last 30 days</div>
      </div>
      <div class="td-toolbar">
        <input class="td-search" id="td-search" type="text" placeholder="Filter by ticker…" autocomplete="off" spellcheck="false">
        <span class="td-count" id="td-count"></span>
      </div>
      <div id="td-body">
        <div class="td-loading">Loading…</div>
      </div>
    </div>
  </main>


  <script src="js/ticker-dives.js"></script>
</body>
</html>
