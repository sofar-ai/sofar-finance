<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOFAR FINANCE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="app-header">
    <div class="app-logo">SOFAR <span>// Finance</span></div>
    <div class="header-meta">
      <div><span class="live-dot"></span>MARKETS</div>
      <div id="clock"></div>
    </div>
  </header>

  <main class="dashboard">

    <!-- LEFT: Markets + Commodities + FX -->
    <aside class="col-left">
      <div class="col-section-header">MARKETS</div>
      <div id="quotes-container"></div>
      <div class="col-divider"></div>
      <div class="col-section-header">COMMODITIES</div>
      <div id="commodities-container"></div>
      <div class="col-divider"></div>
      <div class="col-section-header">FX RATES</div>
      <div id="fx-container"></div>
    </aside>

    <!-- CENTER: 2x2 Chart Grid -->
    <section class="col-center">
      <div class="chart-header-bar">
        <span class="chart-header-label">CHART</span>
        <div class="tf-controls">
          <button class="tf-btn active" data-tf="1D">1D</button>
          <button class="tf-btn" data-tf="5D">5D</button>
          <button class="tf-btn" data-tf="1M">1M</button>
        </div>
      </div>

      <div class="chart-grid">

        <div class="chart-grid-cell" data-ticker="SPY">
          <div class="chart-cell-header">
            <span class="chart-cell-ticker">SPY</span>
            <span class="chart-cell-price" id="chart-price-SPY">--</span>
            <span class="chart-cell-info" id="chart-info-SPY"></span>
          </div>
          <div class="chart-cell-canvas" id="chart-canvas-SPY"></div>
        </div>

        <div class="chart-grid-cell" data-ticker="QQQ">
          <div class="chart-cell-header">
            <span class="chart-cell-ticker">QQQ</span>
            <span class="chart-cell-price" id="chart-price-QQQ">--</span>
            <span class="chart-cell-info" id="chart-info-QQQ"></span>
          </div>
          <div class="chart-cell-canvas" id="chart-canvas-QQQ"></div>
        </div>

        <div class="chart-grid-cell" data-ticker="I:DJI">
          <div class="chart-cell-header">
            <span class="chart-cell-ticker">DJI</span>
            <span class="chart-cell-price" id="chart-price-DJI">--</span>
            <span class="chart-cell-info" id="chart-info-DJI"></span>
          </div>
          <div class="chart-cell-canvas" id="chart-canvas-DJI"></div>
        </div>

        <div class="chart-grid-cell" data-ticker="BTCUSD">
          <div class="chart-cell-header">
            <span class="chart-cell-ticker">BTC</span>
            <span class="chart-cell-price" id="chart-price-BTC">--</span>
            <span class="chart-cell-info" id="chart-info-BTC"></span>
          </div>
          <div class="chart-cell-canvas" id="chart-canvas-BTC"></div>
        </div>

      </div>
    </section>

    <!-- RIGHT: Headlines + Trends -->
    <aside class="col-right">

      <div class="col-right-top">
        <div class="col-section-header">
          HEADLINES
          <span class="section-meta" id="news-refreshed"></span>
          <button class="btn-icon" id="btn-refresh-news" title="Refresh">&#x21BB;</button>
        </div>
        <div class="news-feed" id="news-container"></div>
      </div>

      <div class="col-divider"></div>

      <div class="col-right-bottom">
        <div class="col-section-header">
          TRENDS
          <span class="section-meta" id="trends-refreshed"></span>
          <button class="btn-icon" id="btn-refresh-trends" title="Refresh">&#x21BB;</button>
        </div>
        <div class="trends-list" id="trends-container"></div>
      </div>

    </aside>

  </main>

  <script src="js/quotes.js"></script>
  <script src="js/fx.js"></script>
  <script src="js/chart.js"></script>
  <script src="js/trends.js"></script>
  <script src="js/news.js"></script>
  <script>
    function updateClock() {
      var el = document.getElementById('clock');
      if (el) el.textContent = new Date().toLocaleTimeString([], {
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      }) + ' ET';
    }
    updateClock();
    setInterval(updateClock, 1000);

    Quotes.init('quotes-container', 'commodities-container');
    FXRates.init('fx-container');
    ChartComponent.init();
    TrendsFeed.init('trends-container', 'trends-refreshed');
    NewsFeed.init('news-container', 'news-refreshed');
  </script>

</body>
</html>
