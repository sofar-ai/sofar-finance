<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOFAR FINANCE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── Header ── -->
  <header class="app-header">
    <div class="app-logo">SOFAR <span>// Finance</span></div>
    <div class="header-meta">
      <div><span class="live-dot"></span>LIVE</div>
      <div id="clock"></div>
    </div>
  </header>

  <!-- ── Dashboard ── -->
  <main class="dashboard">

    <!-- Section: Real-time Quotes (Full Width) -->
    <section id="component-quotes" class="quotes-section">
      <div class="section-header">
        <h2 class="section-title">Market Watch</h2>
        <span class="refresh-info" id="quotes-refreshed">--:--</span>
      </div>
      <div class="quotes-container" id="quotes-container"></div>
    </section>

    <!-- Section: Headlines + Trends Layout -->
    <div class="content-with-sidebar">

      <!-- Headlines Feed (Main Content) -->
      <section id="component-news" class="main-content">
        <div class="section-header">
          <h2 class="section-title">Headlines</h2>
          <div style="display:flex;align-items:center;gap:12px;">
            <span class="refresh-info" id="news-refreshed">Loading...</span>
            <button class="btn-refresh" id="btn-refresh-news">↻ Refresh</button>
          </div>
        </div>
        <div class="news-grid" id="news-container"></div>
      </section>

      <!-- Trends Sidebar (Right) -->
      <aside id="component-trends" class="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">TRENDS</span>
          <span class="sidebar-meta">
            <span id="trends-refreshed">--:--</span>
            <button class="btn-refresh-sm" id="btn-refresh-trends" title="Refresh trends">↻</button>
          </span>
        </div>
        <div class="trends-list" id="trends-container"></div>
      </aside>

    </div>

  </main>

  <footer class="app-footer">
    SOFAR FINANCE &mdash; X &amp; RSS FEEDS &mdash; NOT FINANCIAL ADVICE
  </footer>

  <script src="js/quotes.js"></script>
  <script src="js/trends.js"></script>
  <script src="js/news.js"></script>
  <script>
    function updateClock() {
      const el = document.getElementById('clock');
      if (el) el.textContent = new Date().toLocaleTimeString([], {
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      }) + ' ET';
    }
    updateClock();
    setInterval(updateClock, 1000);

    Quotes.init('quotes-container', 'quotes-refreshed', 'SPY');
    TrendsFeed.init('trends-container', 'trends-refreshed');
    NewsFeed.init('news-container', 'news-refreshed');
  </script>

</body>
</html>
