<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOFAR FINANCE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── Header ── -->
  <header class="app-header">
    <div class="app-logo">SOFAR <span>// Finance</span></div>
    <div class="header-meta">
      <div><span class="live-dot"></span>LIVE</div>
      <div id="clock"></div>
    </div>
  </header>

  <!-- ── Dashboard ── -->
  <main class="dashboard">

    <!-- News Feed Component -->
    <section id="component-news">
      <div class="section-header">
        <h2 class="section-title">Financial Headlines</h2>
        <div style="display:flex;align-items:center;gap:12px;">
          <span class="refresh-info" id="news-refreshed">Loading...</span>
          <button class="btn-refresh" id="btn-refresh-news">↻ Refresh</button>
        </div>
      </div>
      <div class="news-grid" id="news-container"></div>
    </section>

    <!-- [PLACEHOLDER] More components go here -->

  </main>

  <footer class="app-footer">
    SOFAR FINANCE &mdash; DATA FROM PUBLIC RSS FEEDS &mdash; NOT FINANCIAL ADVICE
  </footer>

  <script src="js/news.js"></script>
  <script>
    // Live clock
    function updateClock() {
      const el = document.getElementById('clock');
      if (el) el.textContent = new Date().toLocaleTimeString([], {
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      }) + ' ET';
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Init news feed
    NewsFeed.init('news-container', 'news-refreshed');
  </script>

</body>
</html>
