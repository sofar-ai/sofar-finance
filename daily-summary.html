<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Summary — SOFAR Finance</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .ds-header { margin-bottom: 20px; }
    .ds-date {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: #6b7280;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .ds-headline {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.3;
      margin-bottom: 10px;
    }
    .ds-stats-strip {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      padding: 8px 12px;
      background: #0a0f16;
      border: 1px solid var(--border);
      border-radius: 4px;
    }
    .ds-stat { font-family: var(--font-mono); font-size: 11px; }
    .ds-stat-label { color: #6b7280; margin-right: 4px; }
    .ds-stat-val   { font-weight: 700; }
    .ds-section { margin-bottom: 18px; }
    .ds-section-label {
      font-family: var(--font-mono);
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #4b5563;
      margin-bottom: 6px;
    }
    .ds-text {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.7;
    }
    .ds-bullets { list-style: none; padding: 0; margin: 0; }
    .ds-bullets li {
      font-size: 12px;
      color: var(--text-secondary);
      padding: 3px 0 3px 14px;
      line-height: 1.5;
      position: relative;
    }
    .ds-bullets li::before { content: '›'; position: absolute; left: 0; color: #4b5563; }
    .ds-forward {
      background: rgba(96,165,250,0.05);
      border-left: 2px solid #3b82f6;
      padding: 10px 14px;
      border-radius: 0 4px 4px 0;
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    .ds-signals {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .ds-sig-pill {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 12px;
      border: 1px solid;
    }
    .ds-history-label {
      font-family: var(--font-mono);
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #374151;
      text-transform: uppercase;
      margin: 24px 0 10px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .ds-past-card {
      background: #0a0f16;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 14px;
      margin-bottom: 8px;
      cursor: pointer;
    }
    .ds-past-card:hover { border-color: #374151; }
    .ds-past-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 4px;
    }
    .ds-past-date { font-family: var(--font-mono); font-size: 10px; color: #6b7280; }
    .ds-past-hl   { font-size: 12px; color: var(--text-secondary); flex: 1; }
    .ds-past-ret  { font-family: var(--font-mono); font-size: 10px; font-weight: 700; }
    .ds-empty { color: #4b5563; font-size: 13px; padding: 20px 0; text-align: center; }
    .ds-generating { color: #6b7280; font-size: 12px; }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-left">
      <span class="logo">SOFAR</span>
      <span class="header-subtitle">FINANCE</span>
    </div>
    <nav class="app-nav">
      <a href="index.html"         class="nav-tab">Market Dashboard</a>
      <a href="options-flow.html"  class="nav-tab">Options Flow</a>
      <a href="ai-analysis.html"   class="nav-tab">AI Analysis</a>
      <a href="daily-summary.html" class="nav-tab active">Daily Summary</a>
      <a href="performance.html"   class="nav-tab">Performance</a>
      <a href="config.html"        class="nav-tab">Config</a>
    </nav>
    <div class="header-meta">
      <div><span class="live-dot"></span>LIVE</div>
    </div>
  </header>

  <div class="ai-page-layout">
    <div class="ai-page-body">
      <div id="ds-root"><div class="ds-empty">Loading…</div></div>
    </div>
    <aside class="ai-sidebar">
      <div class="ai-sidebar-section" id="ds-sidebar-stats" style="display:none">
        <div class="ai-sidebar-title">📊 Today's Close</div>
        <div id="ds-sidebar-stats-body" class="ai-sidebar-content"></div>
      </div>
      <div class="ai-sidebar-section" id="ds-sidebar-history" style="display:none">
        <div class="ai-sidebar-title">📅 Recent Sessions</div>
        <div id="ds-sidebar-history-body" class="ai-sidebar-content"></div>
      </div>
    </aside>
  </div>

  <script src="js/daily-summary.js"></script>
  <script>DailySummary.init();</script>

  <nav class="mobile-bottom-nav">
    <a href="index.html"        class="mbn-item"><span class="mbn-icon">📈</span><span class="mbn-label">Market</span></a>
    <a href="options-flow.html" class="mbn-item"><span class="mbn-icon">🌊</span><span class="mbn-label">Flow</span></a>
    <a href="ai-analysis.html"  class="mbn-item"><span class="mbn-icon">🤖</span><span class="mbn-label">AI</span></a>
    <a href="daily-summary.html" class="mbn-item active"><span class="mbn-icon">📋</span><span class="mbn-label">Summary</span></a>
    <a href="performance.html"  class="mbn-item"><span class="mbn-icon">🎯</span><span class="mbn-label">Perf</span></a>
    <a href="config.html"       class="mbn-item"><span class="mbn-icon">⚙️</span><span class="mbn-label">Config</span></a>
  </nav>
</body>
</html>
